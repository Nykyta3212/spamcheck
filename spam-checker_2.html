<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpamScan — Spendbase</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0e14;
    --surface:  #13141c;
    --surface2: #1a1b26;
    --surface3: #20212e;
    --border:   #252636;
    --border2:  #2e2f44;
    --text:     #e2e4f0;
    --text2:    #9496b0;
    --muted:    #5a5c75;
    --accent:   #6c63ff;
    --accent2:  #8b85ff;
    --accent-glow: rgba(108,99,255,0.18);
    --c10: #f03e5a;
    --c9:  #f5622a;
    --c8:  #f5920a;
    --c7:  #f5bc00;
    --c6:  #d4c200;
    --c5:  #96bb00;
    --c4:  #3fc760;
    --c3:  #1fc998;
    --c2:  #1bbfbe;
    --c1:  #3aabf5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* Subtle grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 920px;
    margin: 0 auto;
    padding: 28px 24px 48px;
    width: 100%;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 18px rgba(108,99,255,0.45);
  }

  .logo-text {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  .logo-text span {
    color: var(--accent2);
  }

  .nav-sep {
    color: var(--muted);
    font-size: 18px;
    margin: 0 2px;
  }

  .nav-tool {
    font-size: 13px;
    color: var(--text2);
    font-weight: 500;
  }

  .nav-badge {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── HERO ── */
  .hero {
    margin-bottom: 24px;
  }

  .hero h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .hero p {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
  }

  /* ── INPUT ── */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-card:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .input-label {
    padding: 10px 14px 0;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.75;
    resize: none;
    min-height: 160px;
    padding: 10px 14px 14px;
  }

  textarea::placeholder { color: var(--muted); }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 28px;
  }

  .btn {
    padding: 9px 20px;
    border-radius: 7px;
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    box-shadow: 0 2px 12px rgba(108,99,255,0.35);
  }
  .btn-primary:hover {
    background: var(--accent2);
    box-shadow: 0 4px 16px rgba(108,99,255,0.5);
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  .score-badge {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 14px;
  }

  .score-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .score-number {
    font-size: 18px;
    font-weight: 700;
    color: var(--c10);
    font-family: 'JetBrains Mono', monospace;
    transition: color 0.3s;
    min-width: 28px;
    text-align: right;
  }

  /* ── RESULTS ── */
  .results-section { display: none; }
  .results-section.visible {
    display: block;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 14px 16px;
  }

  .stat-val {
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 5px;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-lbl {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .c-danger { color: var(--c10); }
  .c-warn   { color: var(--c7); }
  .c-ok     { color: var(--c4); }
  .c-accent { color: var(--accent2); }

  /* Risk bar */
  .risk-wrap {
    margin-bottom: 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 12px 16px;
  }

  .risk-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .risk-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
  }

  .risk-pct {
    font-size: 12px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text2);
  }

  .risk-bar {
    height: 5px;
    background: var(--surface3);
    border-radius: 999px;
    overflow: hidden;
  }

  .risk-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.55s cubic-bezier(0.4,0,0.2,1);
    background: linear-gradient(90deg, var(--c4), var(--c7), var(--c10));
  }

  /* Section labels */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 10px;
    margin-top: 20px;
  }

  /* Flagged chips */
  .found-list {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-bottom: 20px;
  }

  .found-item {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 9px;
    border-radius: 5px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    border: 1px solid;
    cursor: default;
    font-weight: 500;
  }

  .found-score {
    font-size: 10px;
    font-weight: 700;
    opacity: 0.65;
  }

  .found-cat {
    font-size: 10px;
    opacity: 0.45;
    max-width: 90px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Preview */
  .preview-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 18px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.85;
    white-space: pre-wrap;
    word-wrap: break-word;
    color: var(--text2);
    margin-bottom: 20px;
  }

  /* Highlight spans */
  .hi {
    border-radius: 3px;
    padding: 1px 3px;
    cursor: default;
    transition: filter 0.12s;
    position: relative;
    font-weight: 600;
  }
  .hi:hover { filter: brightness(1.25); }
  .hi::after {
    content: attr(data-score);
    position: absolute;
    top: -26px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface3);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 5px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;
    font-family: 'JetBrains Mono', monospace;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .hi:hover::after { opacity: 1; }

  .score-10 { background: rgba(240,62,90,0.18); color: #f57a92; border-bottom: 2px solid var(--c10); }
  .score-9  { background: rgba(245,98,42,0.15); color: #f5916a; border-bottom: 2px solid var(--c9); }
  .score-8  { background: rgba(245,146,10,0.15);color: #f5b554; border-bottom: 2px solid var(--c8); }
  .score-7  { background: rgba(245,188,0,0.15); color: #f5cc44; border-bottom: 2px solid var(--c7); }
  .score-6  { background: rgba(212,194,0,0.14); color: #d4c840; border-bottom: 2px solid var(--c6); }
  .score-5  { background: rgba(150,187,0,0.14); color: #b0cc30; border-bottom: 2px solid var(--c5); }
  .score-4  { background: rgba(63,199,96,0.12); color: #5ccc72; border-bottom: 2px solid var(--c4); }
  .score-3  { background: rgba(31,201,152,0.12);color: #3dd4a4; border-bottom: 2px solid var(--c3); }
  .score-2  { background: rgba(27,191,190,0.12);color: #2dcbc9; border-bottom: 2px solid var(--c2); }
  .score-1  { background: rgba(58,171,245,0.12);color: #5abef5; border-bottom: 2px solid var(--c1); }

  /* No issues */
  .no-issues {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 20px;
    background: rgba(63,199,96,0.07);
    border: 1px solid rgba(63,199,96,0.2);
    border-radius: 8px;
    color: var(--c4);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 20px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* ── LEGEND TABLE ── */
  .legend {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .legend-row {
    display: grid;
    grid-template-columns: 56px 130px 1fr 180px;
    border-bottom: 1px solid var(--border);
    align-items: stretch;
  }

  .legend-row:last-child { border-bottom: none; }

  .legend-row.header {
    background: var(--surface2);
  }

  .legend-cell {
    padding: 9px 14px;
    font-size: 12px;
    display: flex;
    align-items: center;
    border-right: 1px solid var(--border);
    line-height: 1.3;
  }

  .legend-cell:last-child { border-right: none; }

  /* Header cells */
  .legend-row.header .legend-cell {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    padding: 8px 14px;
  }

  .l-score {
    font-weight: 700;
    font-size: 15px;
    font-family: 'JetBrains Mono', monospace;
    justify-content: center;
  }

  .l-level {
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.2px;
  }

  .l-desc {
    font-size: 11.5px;
    color: var(--text2);
    line-height: 1.4;
  }

  .l-rec {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text2);
  }
</style>
</head>

<div class="wrapper">

  <nav>
    <div class="nav-logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">Spend<span>base</span></div>
    </div>
    <span class="nav-sep">/</span>

  </div>

  <div class="input-card">

Hi {{first_name}},

I noticed you're scaling your engineering team and wanted to reach out...

Ctrl+Enter to analyze"></textarea>

  <div class="controls">

  <div class="results-section" id="results">

    <div class="risk-wrap" id="riskBarWrap" style="display:none">

      <div class="risk-bar"><div class="risk-fill" id="riskFill" style="width:0%"></div></div>

    <div class="section-label">Flagged Words</div>
    <div class="found-list" id="foundList"></div>

    <div class="section-label">Preview with Highlights</div>
    <div class="preview-box" id="previewBox"></div>

    <div class="divider"></div>

    <div class="section-label">Score Legend</div>
    <div class="legend" id="legend"></div>
  </div>
</div>

// Sort by phrase length descending to match longer phrases first
const SORTED_DB = [...SPAM_DB].sort((a,b) => b[0].length - a[0].length);

function getColor(score) {
  const colors = {10:'#ff2d55',9:'#ff6030',8:'#ff8c00',7:'#ffb800',6:'#f0d000',5:'#a8cc00',4:'#4cd964',3:'#32d7a0',2:'#30d5c8',1:'#5ac8fa'};
  return colors[score] || '#888';
}

function analyze() {
  const text = document.getElementById('inputText').value;
  if (!text.trim()) return;

  const results = document.getElementById('results');
  results.classList.remove('visible');

  // Find matches
  const found = [];
  const lowerText = text.toLowerCase();

  // Track which character positions are already matched
  const matchedRanges = [];

  for (const [phrase, score, cat] of SORTED_DB) {
    const lowerPhrase = phrase.toLowerCase();
    let idx = 0;
    while (true) {
      const pos = lowerText.indexOf(lowerPhrase, idx);
      if (pos === -1) break;

      // Check word boundary (simple check)
      const before = pos === 0 || !/[a-zA-Z0-9]/.test(text[pos-1]);
      const after = (pos + phrase.length) >= text.length || !/[a-zA-Z0-9]/.test(text[pos + phrase.length]);

      if (before && after) {
        // Check not overlapping
        const overlapping = matchedRanges.some(([s,e]) => pos < e && pos + phrase.length > s);
        if (!overlapping) {
          matchedRanges.push([pos, pos + phrase.length]);
          found.push({ phrase, score, cat, pos, len: phrase.length });
        }
      }
      idx = pos + 1;
    }
  }

  // Sort by position for highlight
  found.sort((a,b) => a.pos - b.pos);

  // Deduplicate for found list
  const seen = new Map();
  for (const f of found) {
    const key = f.phrase.toLowerCase();
    if (!seen.has(key) || seen.get(key).score < f.score) seen.set(key, f);
  }
  const unique = [...seen.values()].sort((a,b) => b.score - a.score);

  // Stats
  const totalScore = unique.reduce((s,f) => s + f.score, 0);
  const critical = unique.filter(f => f.score >= 9).length;
  const high = unique.filter(f => f.score >= 7 && f.score <= 8).length;
  const moderate = unique.filter(f => f.score < 7).length;

  document.getElementById('totalScore').textContent = totalScore || '0';

  // Stats cards
  const statsRow = document.getElementById('statsRow');
  statsRow.innerHTML = `
    <div class="stat-card">
      <div class="stat-val ${critical > 0 ? 'c-danger' : 'c-ok'}">${critical}</div>
      <div class="stat-lbl">Critical (9–10)</div>
    </div>
    <div class="stat-card">
      <div class="stat-val ${high > 0 ? 'c-warn' : 'c-ok'}">${high}</div>
      <div class="stat-lbl">High Risk (7–8)</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${moderate}</div>
      <div class="stat-lbl">Moderate (1–6)</div>
    </div>
    <div class="stat-card">
      <div class="stat-val c-accent">${unique.length}</div>
      <div class="stat-lbl">Total Triggers</div>
    </div>
  `;

  // Risk bar
  const riskBarWrap = document.getElementById('riskBarWrap');
  const riskPct = Math.min(100, Math.round((totalScore / Math.max(1, unique.length * 10)) * 100 + (unique.length * 3)));
  riskBarWrap.style.display = 'block';
  document.getElementById('riskPct').textContent = Math.min(100, riskPct) + '%';
  setTimeout(() => {
    document.getElementById('riskFill').style.width = Math.min(100, riskPct) + '%';
  }, 50);

  // Found list
  const foundList = document.getElementById('foundList');
  if (unique.length === 0) {
    foundList.innerHTML = '<div class="no-issues">✓ No spam triggers found. Your template looks clean!</div>';
  } else {
    foundList.innerHTML = unique.map(f => {
      const c = getColor(f.score);
      return `<span class="found-item" style="color:${c};background:${c}18;border-color:${c}44">
        <span style="font-weight:700">${escHtml(f.phrase)}</span>
        <span class="found-score">[${f.score}]</span>
        <span class="found-cat">${f.cat}</span>
      </span>`;
    }).join('');
  }

  // Highlighted preview
  let html = '';
  let cursor = 0;
  const sorted = [...found].sort((a,b) => a.pos - b.pos);

  for (const f of sorted) {
    if (f.pos > cursor) {
      html += escHtml(text.slice(cursor, f.pos));
    }
    const c = getColor(f.score);
    const tooltip = `[${f.score}] ${f.cat}`;
    html += `<span class="hi score-${f.score}" data-score="${tooltip}" style="color:${c}">${escHtml(text.slice(f.pos, f.pos + f.len))}</span>`;
    cursor = f.pos + f.len;
  }
  if (cursor < text.length) html += escHtml(text.slice(cursor));

  document.getElementById('previewBox').innerHTML = html;

  // Legend
  const legend = document.getElementById('legend');
  legend.innerHTML = `
    <div class="legend-row header">
      <div class="legend-cell">Score</div>
      <div class="legend-cell">Risk Level</div>
      <div class="legend-cell">Description</div>
      <div class="legend-cell">Recommendation</div>
    </div>
    ${LEGEND_DATA.map(([score, level, desc, rec, color]) => `
      <div class="legend-row">
        <div class="legend-cell l-score" style="color:${color}">${score}</div>
        <div class="legend-cell l-level" style="color:${color}">${level}</div>
        <div class="legend-cell l-desc">${desc}</div>
        <div class="legend-cell l-rec" style="color:${color}">${rec}</div>
      </div>
    `).join('')}
  `;

  results.classList.add('visible');
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('totalScore').textContent = '—';
  document.getElementById('results').classList.remove('visible');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter-less submit on Ctrl+Enter
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('inputText').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyze();
  });
});
</script>
